name: QA Automation Suite CI

name: API&UI自动化测试流水线
on:
  push:
    branches: [main, master]
    paths:
      - tests/**
      - core/**
      - utils/**
      - config.json
      - requirements.txt
      - .github/workflows/auto_test.yml
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

env:
  PYTHON_VERSION: "3.11"
  ALLURE_RES_DIR: reports/allure-results
  ALLURE_REPORT_DIR: allure-report

jobs:
  test_task:
    name: 执行API+UI自动化测试
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            .venv
          key: ${{ runner.os }}-py-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium & system libs
        run: |
          python -m playwright install --with-deps chromium

      - name: Install Allure CLI
        uses: qameta-io/allure-action@master

      - name: Make report dir
        run: mkdir -p ${{ env.ALLURE_RES_DIR }}

      - name: Run API Test (-m api)
        run: pytest -m api --alluredir=${{ env.ALLURE_RES_DIR }} --disable-warnings

      - name: Run UI Test (-m ui)
        run: pytest -m ui --alluredir=${{ env.ALLURE_RES_DIR }} --disable-warnings

      - name: Generate Allure HTML Report
        if: always()
        run: allure generate ${{ env.ALLURE_RES_DIR }} -o ${{ env.ALLURE_REPORT_DIR }} --clean

      - name: Upload Allure Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-test-report
          path: ${{ env.ALLURE_REPORT_DIR }}
          retention-days: 30

      - name: Deploy report to Github Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ env.ALLURE_REPORT_DIR }}
          publish_branch: gh-pages